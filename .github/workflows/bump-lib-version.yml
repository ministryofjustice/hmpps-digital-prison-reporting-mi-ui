name: Bump library version

on:
  workflow_dispatch:

jobs:
  bump-version:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.x

      - name: SLSA - supply chain attack mitigation
        uses: ministryofjustice/devsecops-actions/sca/slsa@7dc13c20e2bf541b8a77fa1320a04983b18846f6
        with:
          security-patch-package-exclusion: '@ministryofjustice/hmpps-digital-prison-reporting-frontend'

      - name: Get version
        id: get-version
        run: |
          CURRENT_VERSION=$(npm view @ministryofjustice/hmpps-digital-prison-reporting-frontend version)
          echo "Current version: $CURRENT_VERSION"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump dependency version
        run: npm install @ministryofjustice/hmpps-digital-prison-reporting-frontend@^${{ steps.get-version.outputs.current_version }} --save

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b feature/bump-lib-to-v${{ steps.get-version.outputs.current_version }}
          git add package.json package-lock.json
          git commit -m "Bump library version to ${{ steps.get-version.outputs.current_version }}"
          git push origin feature/bump-lib-to-v${{ steps.get-version.outputs.current_version }}
          git tag -a Lib-v${{ steps.get-version.outputs.current_version }} -m Lib-v${{ steps.get-version.outputs.current_version }}
          git push origin Lib-v${{ steps.get-version.outputs.current_version }}

      - name: Create pull request
        run: gh pr create -B main -H 'feature/bump-lib-to-v${{ steps.get-version.outputs.current_version }}' --title 'Bump library version to ${{ steps.get-version.outputs.current_version }}' --body ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
